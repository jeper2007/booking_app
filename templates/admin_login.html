<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxStay Admin — Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .admin-login-wrap {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .admin-card {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
      animation: fadeUp .6s ease;
    }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245, 166, 35, .15);
      color: var(--gold);
      border: 1px solid rgba(245, 166, 35, .3);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .5px;
      margin-bottom: 24px;
    }

    .admin-card h1 {
      color: #fff;
      font-size: 1.7rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .admin-card p {
      color: rgba(255, 255, 255, .45);
      font-size: .88rem;
      margin-bottom: 28px;
    }

    .adm-group {
      margin-bottom: 18px;
    }

    .adm-group label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: rgba(255, 255, 255, .5);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .adm-group input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255, 255, 255, .06);
      border: 1.5px solid rgba(255, 255, 255, .1);
      border-radius: 10px;
      color: #fff;
      font-size: .93rem;
      font-family: inherit;
      outline: none;
      transition: var(--transition);
    }

    .adm-group input::placeholder {
      color: rgba(255, 255, 255, .25);
    }

    .adm-group input:focus {
      border-color: var(--gold);
      background: rgba(255, 255, 255, .08);
    }

    .btn-admin {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), #e67e22);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 8px;
    }

    .btn-admin:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(245, 166, 35, .35);
    }

    .err {
      background: rgba(233, 69, 96, .15);
      border: 1px solid rgba(233, 69, 96, .3);
      color: #ff6b81;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .85rem;
      margin-bottom: 16px;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: rgba(255, 255, 255, .35);
      font-size: .83rem;
      transition: var(--transition);
    }

    .back-link a:hover {
      color: var(--gold);
    }

    .hint {
      background: rgba(245, 166, 35, .08);
      border: 1px solid rgba(245, 166, 35, .2);
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 20px;
      font-size: .8rem;
      color: rgba(255, 255, 255, .45);
      line-height: 1.6;
    }

    .hint strong {
      color: var(--gold);
    }
  </style>
</head>

<body>
  <div class="admin-login-wrap">
    <div class="admin-card">
      <div class="admin-badge">🛡️ ADMIN PORTAL</div>
      <h1>Admin Sign In</h1>
      <p>LuxStay Management Dashboard — authorized personnel only.</p>

      {% if error %}
      <div class="err">❌ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/admin/login">
        <div class="adm-group">
          <label>Admin Email</label>
          <input type="email" name="email" placeholder="admin@luxstay.ph" required autofocus>
        </div>
        <div class="adm-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-admin">Sign In to Dashboard →</button>
      </form>

      <div class="hint">
        <strong>Default credentials:</strong><br>
        Email: admin@luxstay.ph<br>
        Password: admin123
      </div>

      <div class="back-link">
        <a href="/">← Back to Guest Login</a>
      </div>
    </div>
  </div>
</body>

</html>
